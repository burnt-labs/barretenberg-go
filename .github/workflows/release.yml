name: Build and Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "wrapper/**"
      - "include/**"
      - "barretenberg/**"
      - "checksums.json"
      - "scripts/**"
      - "Makefile"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: linux_amd64
            runner: ubicloud-standard-4
            aztec_arch: amd64
            aztec_os: linux
          - platform: linux_arm64
            runner: ubicloud-standard-4-arm
            aztec_arch: arm64
            aztec_os: linux
          - platform: darwin_amd64
            runner: macos-15
            aztec_arch: amd64
            aztec_os: darwin
            cross_compile: true
          - platform: darwin_arm64
            runner: macos-latest
            aztec_arch: arm64
            aztec_os: darwin
            cross_compile: false

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Install libc++ (Linux arm64)
        if: matrix.platform == 'linux_arm64'
        run: sudo apt-get update && sudo apt-get install -y libc++-dev libc++abi-dev

      - name: Build wrapper
        run: ./scripts/build-wrapper.sh --platform ${{ matrix.platform }}

      - name: Run tests
        if: matrix.cross_compile != true
        run: go test -v -count=1 ./...

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: lib-${{ matrix.platform }}
          path: lib/${{ matrix.platform }}/libbarretenberg.a

  commit-libs:
    needs: build
    runs-on: ubicloud-standard-2
    steps:
      - name: Configure SSH deploy key
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.BARRETENBERG_SSH_KEY }}

      - name: Install git-lfs
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq git-lfs
          git lfs install --system

      - uses: actions/checkout@v5
        with:
          ssh-key: ${{ secrets.BARRETENBERG_SSH_KEY }}
          lfs: false

      - name: Configure LFS HTTPS credentials
        run: |
          git config credential.helper store
          printf 'https://x-access-token:%s@github.com\n' \
            "${{ secrets.GITHUB_TOKEN }}" >> ~/.git-credentials
          git config lfs.url \
            "https://github.com/${{ github.repository }}.git/info/lfs"

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: Place libs in repo
        run: |
          for platform in linux_amd64 linux_arm64 darwin_amd64 darwin_arm64; do
            mkdir -p "lib/${platform}"
            cp "artifacts/lib-${platform}/libbarretenberg.a" \
               "lib/${platform}/libbarretenberg.a"
          done
          ls -lh lib/*/libbarretenberg.a

      - name: Commit and push updated libs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add lib/
          if git diff --cached --quiet; then
            echo "No changes to libs — skipping commit"
            exit 0
          fi

          # Push LFS binary objects to LFS storage (uses HTTPS credentials)
          git lfs push origin --all

          OWNER="${GITHUB_REPOSITORY_OWNER}"
          REPO="${GITHUB_REPOSITORY#*/}"
          BRANCH="${GITHUB_REF_NAME}"
          HEAD_SHA=$(git rev-parse HEAD)
          BASE_TREE=$(git rev-parse "HEAD^{tree}")

          # Upload each LFS pointer blob to GitHub's git object DB and collect tree entries.
          # Commits created via the GitHub API are automatically marked "Verified".
          TREE_JSON='[]'
          for platform in linux_amd64 linux_arm64 darwin_amd64 darwin_arm64; do
            f="lib/${platform}/libbarretenberg.a"
            LOCAL_BLOB=$(git ls-files --stage "$f" | awk '{print $2}')
            POINTER=$(git cat-file -p "$LOCAL_BLOB")
            BLOB_SHA=$(gh api "repos/$OWNER/$REPO/git/blobs" \
              -f content="$POINTER" -f encoding="utf-8" --jq '.sha')
            TREE_JSON=$(printf '%s' "$TREE_JSON" | jq \
              --arg p "$f" --arg s "$BLOB_SHA" \
              '. + [{"path":$p,"mode":"100644","type":"blob","sha":$s}]')
          done

          NEW_TREE=$(gh api "repos/$OWNER/$REPO/git/trees" \
            --input <(jq -n \
              --argjson tree "$TREE_JSON" \
              --arg base "$BASE_TREE" \
              '{"base_tree":$base,"tree":$tree}') \
            --jq '.sha')

          NEW_COMMIT=$(gh api "repos/$OWNER/$REPO/git/commits" \
            -f message="chore: update bundled static libraries" \
            -f tree="$NEW_TREE" \
            -f "parents[]=$HEAD_SHA" \
            --jq '.sha')

          gh api "repos/$OWNER/$REPO/git/refs/heads/$BRANCH" \
            -X PATCH -f sha="$NEW_COMMIT"
          echo "Created verified commit $NEW_COMMIT on $BRANCH"

  release:
    needs: commit-libs
    runs-on: ubicloud-standard-2

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          for platform in linux_amd64 linux_arm64 darwin_amd64 darwin_arm64; do
            cp "artifacts/lib-${platform}/libbarretenberg.a" \
               "release-assets/libbarretenberg_${platform}.a"
          done
          ls -lh release-assets/

      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum *.a > checksums.txt
          cat checksums.txt

      - name: Determine next version
        id: semver
        uses: go-semantic-release/action@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          allow-initial-development-versions: true
          force-bump-patch-version: true
          dry: true

      - name: Create release with assets
        if: steps.semver.outputs.version != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: v${{ steps.semver.outputs.version }}
        run: |
          gh release create "$VERSION" \
            --title "$VERSION" \
            --generate-notes \
            release-assets/*

          echo "Released $VERSION with assets:"
          ls release-assets/
