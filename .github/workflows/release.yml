name: Build and Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "wrapper/**"
      - "include/**"
      - "barretenberg/**"
      - "checksums.json"
      - "scripts/**"
      - "Makefile"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: linux_amd64
            runner: ubicloud-standard-4
            aztec_arch: amd64
            aztec_os: linux
          - platform: linux_arm64
            runner: ubicloud-standard-4-arm
            aztec_arch: arm64
            aztec_os: linux
          - platform: darwin_amd64
            runner: macos-15
            aztec_arch: amd64
            aztec_os: darwin
            cross_compile: true
          - platform: darwin_arm64
            runner: macos-latest
            aztec_arch: arm64
            aztec_os: darwin
            cross_compile: false

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Install libc++ (Linux arm64)
        if: matrix.platform == 'linux_arm64'
        run: sudo apt-get update && sudo apt-get install -y libc++-dev libc++abi-dev

      - name: Build wrapper
        run: ./scripts/build-wrapper.sh --platform ${{ matrix.platform }}

      - name: Run tests
        if: matrix.cross_compile != true
        run: go test -v -count=1 ./...

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: lib-${{ matrix.platform }}
          path: lib/${{ matrix.platform }}/libbarretenberg.a

  commit-libs:
    needs: build
    runs-on: ubicloud-standard-2
    steps:
      - name: Configure SSH deploy key
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.BARRETENBERG_SSH_KEY }}

      - uses: actions/checkout@v5
        with:
          ssh-key: ${{ secrets.BARRETENBERG_SSH_KEY }}

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: Place libs in repo
        run: |
          for platform in linux_amd64 linux_arm64 darwin_amd64 darwin_arm64; do
            mkdir -p "lib/${platform}"
            cp "artifacts/lib-${platform}/libbarretenberg.a" \
               "lib/${platform}/libbarretenberg.a"
          done
          ls -lh lib/*/libbarretenberg.a

      - name: Commit and push updated libs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config gpg.format ssh
          git config user.signingkey "$(ssh-add -L | head -1)"
          git config commit.gpgsign true

          git add lib/
          if git diff --cached --quiet; then
            echo "No changes to libs — skipping commit"
            exit 0
          fi

          git commit -m "chore: update bundled static libraries"
          git push

  release:
    needs: commit-libs
    runs-on: ubicloud-standard-2

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          for platform in linux_amd64 linux_arm64 darwin_amd64 darwin_arm64; do
            cp "artifacts/lib-${platform}/libbarretenberg.a" \
               "release-assets/libbarretenberg_${platform}.a"
          done
          ls -lh release-assets/

      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum *.a > checksums.txt
          cat checksums.txt

      - name: Determine next version
        id: semver
        uses: go-semantic-release/action@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          allow-initial-development-versions: true
          force-bump-patch-version: true
          dry: true

      - name: Create release with assets
        if: steps.semver.outputs.version != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: v${{ steps.semver.outputs.version }}
        run: |
          gh release create "$VERSION" \
            --title "$VERSION" \
            --generate-notes \
            release-assets/*

          echo "Released $VERSION with assets:"
          ls release-assets/
