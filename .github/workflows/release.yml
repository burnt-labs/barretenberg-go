name: Build and Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'wrapper/**'
      - 'include/**'
      - 'barretenberg/**'
      - 'checksums.json'
      - 'scripts/**'
      - 'Makefile'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: linux_amd64
            runner: ubuntu-latest
            aztec_arch: amd64
            aztec_os: linux
          - platform: linux_arm64
            runner: ubuntu-24.04-arm
            aztec_arch: arm64
            aztec_os: linux
          - platform: darwin_amd64
            runner: macos-14
            aztec_arch: amd64
            aztec_os: darwin
            cross_compile: true
          - platform: darwin_arm64
            runner: macos-latest
            aztec_arch: arm64
            aztec_os: darwin
            cross_compile: false

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install libc++ (Linux arm64)
        if: matrix.platform == 'linux_arm64'
        run: sudo apt-get update && sudo apt-get install -y libc++-dev libc++abi-dev

      - name: Build wrapper
        run: ./scripts/build-wrapper.sh --platform ${{ matrix.platform }}

      - name: Run tests
        if: matrix.cross_compile != true
        run: go test -v -count=1 ./...

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lib-${{ matrix.platform }}
          path: lib/${{ matrix.platform }}/libbarretenberg.a

  commit-and-release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Place archives
        run: |
          for platform in linux_amd64 linux_arm64 darwin_amd64 darwin_arm64; do
            mkdir -p lib/$platform
            cp artifacts/lib-$platform/libbarretenberg.a lib/$platform/
          done

      - name: Commit archives via API (verified signature)
        id: commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: burnt-labs/barretenberg-go
        run: |
          # Check if any archives actually changed
          git add lib/
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "committed=false" >> "$GITHUB_OUTPUT"
            MAIN_SHA=$(gh api repos/$REPO/git/ref/heads/main --jq '.object.sha')
            echo "sha=$MAIN_SHA" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git reset HEAD -- .

          # Get current main HEAD
          MAIN_SHA=$(gh api repos/$REPO/git/ref/heads/main --jq '.object.sha')
          BASE_TREE=$(gh api repos/$REPO/git/commits/$MAIN_SHA --jq '.tree.sha')

          # Upload each archive as a blob and build tree entries
          TREE_ENTRIES="["
          FIRST=true
          for platform in linux_amd64 linux_arm64 darwin_amd64 darwin_arm64; do
            FILE="lib/$platform/libbarretenberg.a"
            if [ ! -f "$FILE" ]; then
              echo "Skipping $FILE (not found)"
              continue
            fi
            echo "Uploading blob for $FILE..."
            BLOB_SHA=$(base64 -w 0 "$FILE" | jq -Rs '{content: ., encoding: "base64"}' | \
              gh api repos/$REPO/git/blobs --input - --jq '.sha')
            if [ "$FIRST" = true ]; then
              FIRST=false
            else
              TREE_ENTRIES+=","
            fi
            TREE_ENTRIES+="{\"path\":\"$FILE\",\"mode\":\"100644\",\"type\":\"blob\",\"sha\":\"$BLOB_SHA\"}"
          done
          TREE_ENTRIES+="]"

          # Create tree
          TREE_SHA=$(jq -n --arg base "$BASE_TREE" --argjson tree "$TREE_ENTRIES" \
            '{base_tree: $base, tree: $tree}' | \
            gh api repos/$REPO/git/trees --input - --jq '.sha')

          # Create commit (GitHub signs this automatically)
          COMMIT_SHA=$(jq -n \
            --arg msg "build: update pre-built archives for all platforms" \
            --arg tree "$TREE_SHA" \
            --argjson parents "[\"$MAIN_SHA\"]" \
            '{message: $msg, tree: $tree, parents: $parents}' | \
            gh api repos/$REPO/git/commits --input - --jq '.sha')

          # Update main ref
          gh api repos/$REPO/git/refs/heads/main \
            -X PATCH \
            -f sha="$COMMIT_SHA" \
            -F force=false

          echo "Committed $COMMIT_SHA to main (verified signature)"
          echo "committed=true" >> "$GITHUB_OUTPUT"
          echo "sha=$COMMIT_SHA" >> "$GITHUB_OUTPUT"

      - name: Determine next version
        id: semver
        uses: go-semantic-release/action@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          allow-initial-development-versions: true
          force-bump-patch-version: true
          dry: true

      - name: Tag and release
        if: steps.semver.outputs.version != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: burnt-labs/barretenberg-go
          VERSION: v${{ steps.semver.outputs.version }}
          TARGET_SHA: ${{ steps.commit.outputs.sha }}
        run: |
          # Create tag pointing to the commit with built archives
          gh api repos/$REPO/git/refs \
            -f ref="refs/tags/$VERSION" \
            -f sha="$TARGET_SHA"

          echo "Tagged $TARGET_SHA as $VERSION"

          # Create release with changelog
          gh release create "$VERSION" \
            --target "$TARGET_SHA" \
            --title "$VERSION" \
            --generate-notes
