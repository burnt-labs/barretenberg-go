name: PR Tests
on:
  pull_request:
    branches: [main]
    paths: ['barretenberg/**', 'wrapper/**', 'include/**', 'checksums.json', 'scripts/**', 'Makefile']
jobs:
  test:
    strategy:
      matrix:
        include:
          - {platform: linux_amd64, runner: ubuntu-latest, aztec_arch: amd64, aztec_os: linux}
          - {platform: linux_arm64, runner: ubuntu-24.04-arm, aztec_arch: arm64, aztec_os: linux}
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: {go-version: '1.25'}
      - if: matrix.platform == 'linux_arm64'
        run: sudo apt-get update && sudo apt-get install -y libc++-dev libc++abi-dev
      - run: ./scripts/build-wrapper.sh --platform ${{ matrix.platform }}
      - run: go test -v -count=1 ./...
