name: PR Tests

on:
  pull_request:
    branches: [main]
    paths: ['barretenberg/**', 'wrapper/**', 'include/**', 'checksums.json', 'scripts/**', 'Makefile']

jobs:
  test:
    strategy:
      matrix:
        include:
          - platform: linux_amd64
            runner: depot-ubuntu-24.04-4
            aztec_arch: amd64
            aztec_os: linux
          - platform: linux_arm64
            runner: depot-ubuntu-24.04-arm-4
            aztec_arch: arm64
            aztec_os: linux

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install libc++ (Linux arm64)
        if: matrix.platform == 'linux_arm64'
        run: sudo apt-get update && sudo apt-get install -y libc++-dev libc++abi-dev

      - name: Build wrapper
        run: ./scripts/build-wrapper.sh --platform ${{ matrix.platform }}

      - name: Run tests
        run: go test -v -count=1 ./...
